<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simply Chocolate</title>
  </head>
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/modern-normalize/3.0.1/modern-normalize.min.css"
    integrity="sha512-q6WgHqiHlKyOqslT/lgBgodhd03Wp4BEqKeW6nNtlOY4quzyG3VoQKFrieaCeSnuVseNKRGpGeDU3qPmabCANg=="
    crossorigin="anonymous"
    referrerpolicy="no-referrer"
  />
  <link rel="stylesheet" href="./styles.css" />
  <body>
    <!-- Header -->
    <header class="container">
      <div class="header-container">
        <nav class="header-nav">
          <a class="header-logo" href="./index.html">Simply Chocolate</a>
          <svg class="icon-logo" width="24" height="24">
            <use href="./icon.svg#icon-logo-chocolate"></use>
          </svg>
          <ul class="header-list">
            <li class="header-list-item">
              <a href="" class="header-link-item">Home</a>
            </li>
            <li class="header-list-item">
              <a href="" class="header-link-item">How it's made?</a>
            </li>
            <li class="header-list-item">
              <a href="" class="header-link-item">Our products</a>
            </li>
            <li class="header-list-item">
              <a href="" class="header-link-item">Top sellers</a>
            </li>
            <li class="header-list-item">
              <a href="" class="header-link-item">Chocolate is loved</a>
            </li>
          </ul>
        </nav>
        <ul class="header-socials">
          <li>
            <svg class="header-link" width="24" height="24">
              <use href="./icon.svg#icon-instagram">Instagram</use>
            </svg>
          </li>
          <li>
            <svg class="header-link" width="24" height="24">
              <use href="./icon.svg#icon-twitter">Twitter</use>
            </svg>
          </li>
        </ul>
      </div>
    </header>
    <main>
      <!-- Hero section -->
      <section class="hero-section container">
        <h1 class="hero-title">
          Treat yourself or a loved one to our finest ingredients for a moment
          of pure delight!
        </h1>
        <div class="hero-wrapper">
          <ul class="hero-list-btn">
            <li class="hero-item-btn">
              <button class="btn" type="button">Buy Now</button>
            </li>
            <li class="hero-item-btn">
              <button class="btn-hero" type="button">How it’s made</button>
            </li>
          </ul>
          <a class="hero-link" href="">scroll down</a>
        </div>
      </section>
    </main>
  </body>
</html>
